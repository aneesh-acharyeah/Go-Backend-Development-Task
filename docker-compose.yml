services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: users_api
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    environment:
      APP_ENV: development
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@db:5432/users_api?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data:
